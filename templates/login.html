<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Boom.Records — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
  body { background:#f4f4f4; font-family:'Nunito',system-ui,sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; }
  .card { background:#fff; border-radius:14px; box-shadow:0 4px 24px rgba(0,0,0,.08); padding:48px 44px; width:100%; max-width:400px; text-align:center; }
  .logo { font-size:40px; font-weight:900; color:#e31e24; letter-spacing:-1px; margin-bottom:6px; }
  .subtitle { font-size:13px; color:#888; margin-bottom:32px; }
  label { display:block; text-align:left; font-size:12px; font-weight:700; color:#555; letter-spacing:.06em; text-transform:uppercase; margin-bottom:6px; }
  input[type=password] { width:100%; border:1.5px solid #e0e0e0; border-radius:8px; padding:11px 14px; font-size:15px; font-family:inherit; color:#111; outline:none; transition:border-color .2s; }
  input[type=password]:focus { border-color:#e31e24; }
  .btn { width:100%; background:#e31e24; color:#fff; border:none; border-radius:8px; padding:12px; font-size:15px; font-weight:700; font-family:inherit; cursor:pointer; margin-top:18px; transition:background .15s; }
  .btn:hover { background:#c41a1f; }
  .btn-google { width:100%; background:#fff; color:#3c4043; border:1.5px solid #dadce0; border-radius:8px; padding:11px 14px; font-size:15px; font-weight:600; font-family:inherit; cursor:pointer; margin-top:8px; transition:background .15s, box-shadow .15s; display:flex; align-items:center; justify-content:center; gap:10px; text-decoration:none; }
  .btn-google:hover { background:#f8f9fa; box-shadow:0 1px 6px rgba(0,0,0,.12); }
  .btn-google svg { flex-shrink:0; }
  .error { background:#fef2f2; border:1px solid #fca5a5; color:#b91c1c; border-radius:8px; padding:10px 14px; font-size:13px; margin-bottom:18px; text-align:left; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">boom.</div>
  <div class="subtitle">Expense &amp; Recoupment Tracker</div>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}

  {% if error %}
  {# After a failed SSO attempt, show a retry button #}
  <a href="/login" class="btn-google">
    <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg"><path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/><path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/><path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/><path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/></svg>
    Try again with Google
  </a>
  {% else %}
  {# Legacy password form — only used in local dev when no Google creds are set #}
  <form method="POST">
    <label for="pw">Password</label>
    <input type="password" id="pw" name="password" placeholder="Enter password" autofocus/>
    <button class="btn" type="submit">Sign In</button>
  </form>
  {% endif %}
</div>
</body>
</html>
