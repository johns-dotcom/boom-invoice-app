<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Boom Records — Sign In</title>
<style>
  :root { --bg:#0f0f13; --surface:#1a1a24; --border:#2e2e3e; --accent:#6c63ff; --text:#e8e8f0; --muted:#7a7a9a; --red:#f87171; }
  *, *::before, *::after { box-sizing: border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; }
  .box { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:40px; width:360px; }
  h1 { font-size:18px; font-weight:700; margin-bottom:4px; }
  .sub { font-size:13px; color:var(--muted); margin-bottom:28px; }
  label { display:block; font-size:11px; font-weight:600; letter-spacing:.06em; text-transform:uppercase; color:var(--muted); margin-bottom:6px; }
  input[type=password] { width:100%; background:var(--bg); border:1px solid var(--border); border-radius:7px; padding:10px 12px; color:var(--text); font-size:14px; }
  input[type=password]:focus { outline:none; border-color:var(--accent); }
  button { margin-top:16px; width:100%; background:var(--accent); color:#fff; border:none; border-radius:7px; padding:11px; font-size:14px; font-weight:600; cursor:pointer; }
  button:hover { opacity:.88; }
  .error { margin-top:12px; color:var(--red); font-size:13px; }
</style>
</head>
<body>
<div class="box">
  <h1>Boom Records</h1>
  <p class="sub">Invoice Parser — Team Access</p>
  <form method="POST">
    <label>Password</label>
    <input type="password" name="password" autofocus placeholder="Enter team password"/>
    <button type="submit">Sign In</button>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
  </form>
</div>
</body>
</html>
