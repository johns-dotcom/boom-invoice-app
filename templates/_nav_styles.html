{# Shared nav CSS — include inside <style> on every page #}
  /* ── Shared nav ───────────────────────────────────────────────────────────── */
  header { background:#fff; border-bottom:1px solid var(--border); padding:0 24px; display:flex; align-items:center; justify-content:space-between; height:56px; position:sticky; top:0; z-index:100; }
  .logo { font-size:21px; font-weight:900; color:var(--red); letter-spacing:-0.5px; text-decoration:none; flex-shrink:0; margin-right:12px; }
  .header-right { display:flex; gap:2px; align-items:center; }

  /* Plain text nav links */
  .nav-link { background:none; border:none; color:#6b7280; padding:6px 9px; border-radius:7px; font-size:13px; font-weight:600; text-decoration:none; display:inline-block; transition:color .15s, background .15s; white-space:nowrap; }
  .nav-link:hover { color:var(--text); background:#f3f4f6; }

  /* Active page — subtle red pill */
  .nav-active { background:#fef2f2; border:none; color:var(--red); padding:6px 9px; border-radius:7px; font-size:13px; font-weight:700; text-decoration:none; display:inline-block; white-space:nowrap; }

  /* "+ Add" — primary CTA */
  .nav-add { background:var(--red); color:#fff; padding:7px 13px; border-radius:7px; font-size:13px; font-weight:700; text-decoration:none; display:inline-block; transition:background .15s; white-space:nowrap; margin-right:6px; }
  .nav-add:hover { background:#c41a1f; }

  /* Approvals badge */
  .nav-badge { background:var(--red); color:#fff; font-size:9px; font-weight:900; padding:1px 5px; border-radius:10px; margin-left:3px; vertical-align:middle; }

  /* Divider between nav groups */
  .nav-divider { width:1px; height:16px; background:#e5e7eb; margin:0 6px; flex-shrink:0; }

  /* ── More dropdown (secondary links) ── */
  .nav-more-wrap { position:relative; }
  .nav-more-btn { background:none; border:none; color:#6b7280; padding:6px 9px; border-radius:7px; font-size:13px; font-weight:600; font-family:inherit; cursor:pointer; transition:color .15s, background .15s; white-space:nowrap; display:flex; align-items:center; gap:4px; }
  .nav-more-btn:hover { color:var(--text); background:#f3f4f6; }
  .nav-more-btn.nav-more-active { background:#fef2f2; color:var(--red); }
  .nav-more-btn .caret { font-size:9px; opacity:.6; }
  .nav-more-dropdown { display:none; position:absolute; left:0; top:calc(100% + 6px); background:#fff; border:1.5px solid var(--border); border-radius:10px; box-shadow:0 8px 24px rgba(0,0,0,.1); min-width:140px; overflow:hidden; z-index:200; }
  .nav-more-dropdown.open { display:block; }
  .nav-more-dropdown a { display:block; padding:10px 16px; font-size:13px; font-weight:600; color:var(--text); text-decoration:none; transition:background .12s; }
  .nav-more-dropdown a:hover { background:#f9fafb; color:var(--red); }
  .nav-more-dropdown a + a { border-top:1px solid #f3f4f6; }
  .nav-more-dropdown a.active { color:var(--red); background:#fef2f2; }

  /* Export dropdown */
  .nav-export-wrap { position:relative; }
  .nav-export-btn { background:none; border:none; color:#9ca3af; padding:6px 9px; border-radius:7px; font-size:13px; font-weight:600; font-family:inherit; cursor:pointer; transition:color .15s, background .15s; white-space:nowrap; display:flex; align-items:center; gap:4px; }
  .nav-export-btn:hover { color:var(--text); background:#f3f4f6; }
  .nav-export-btn .caret { font-size:9px; opacity:.6; }
  .nav-export-dropdown { display:none; position:absolute; right:0; top:calc(100% + 6px); background:#fff; border:1.5px solid var(--border); border-radius:10px; box-shadow:0 8px 24px rgba(0,0,0,.1); min-width:160px; overflow:hidden; z-index:200; }
  .nav-export-dropdown.open { display:block; }
  .nav-export-dropdown a { display:block; padding:10px 16px; font-size:13px; font-weight:600; color:var(--text); text-decoration:none; transition:background .12s; }
  .nav-export-dropdown a:hover { background:#f9fafb; color:var(--red); }
  .nav-export-dropdown a + a { border-top:1px solid #f3f4f6; }

  /* User pill */
  .nav-user-wrap { display:flex; align-items:center; gap:8px; margin-left:6px; padding-left:8px; border-left:1px solid #e5e7eb; }
  .nav-avatar { width:28px; height:28px; border-radius:50%; background:#fef2f2; border:1.5px solid #fca5a5; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:900; color:var(--red); flex-shrink:0; }
  .nav-username { font-size:12px; color:#6b7280; font-weight:700; }
  .nav-signout { color:#d1d5db; font-size:12px; font-weight:600; text-decoration:none; padding:4px 8px; border-radius:6px; transition:color .15s; white-space:nowrap; }
  .nav-signout:hover { color:#dc2626; }

  /* Mobile */
  .mob-menu-btn { display:none; background:none; border:1.5px solid var(--border); border-radius:7px; padding:5px 10px; font-size:17px; cursor:pointer; color:var(--muted); line-height:1; flex-shrink:0; }
  .mob-nav { display:none; flex-direction:column; background:#fff; border-bottom:1px solid var(--border); }
  .mob-nav.open { display:flex; }
  .mob-nav a { font-size:14px; font-weight:600; padding:13px 20px; border-bottom:1px solid #f3f4f6; color:var(--text); text-decoration:none; }
  .mob-nav a:last-child { border-bottom:none; }
  .mob-nav a:active { background:#fef2f2; }
  @media (max-width:700px) {
    .header-right { display:none !important; }
    .mob-menu-btn { display:block; }
  }
  /* ── Shared page layout ──────────────────────────────────────────────────── */
  .page-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; flex-wrap:wrap; gap:12px; }
  .page-header h1 { font-size:20px; font-weight:900; }
