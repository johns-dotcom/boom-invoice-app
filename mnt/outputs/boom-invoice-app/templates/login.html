<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Boom.Records — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
  body { background:#f4f4f4; font-family:'Nunito',system-ui,sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; }
  .card { background:#fff; border-radius:14px; box-shadow:0 4px 24px rgba(0,0,0,.08); padding:48px 44px; width:100%; max-width:400px; text-align:center; }
  .logo { font-size:40px; font-weight:900; color:#e31e24; letter-spacing:-1px; margin-bottom:6px; }
  .subtitle { font-size:13px; color:#888; margin-bottom:32px; }
  label { display:block; text-align:left; font-size:12px; font-weight:700; color:#555; letter-spacing:.06em; text-transform:uppercase; margin-bottom:6px; }
  input[type=password] { width:100%; border:1.5px solid #e0e0e0; border-radius:8px; padding:11px 14px; font-size:15px; font-family:inherit; color:#111; outline:none; transition:border-color .2s; }
  input[type=password]:focus { border-color:#e31e24; }
  .btn { width:100%; background:#e31e24; color:#fff; border:none; border-radius:8px; padding:12px; font-size:15px; font-weight:700; font-family:inherit; cursor:pointer; margin-top:18px; transition:background .15s; }
  .btn:hover { background:#c41a1f; }
  .error { background:#fef2f2; border:1px solid #fca5a5; color:#b91c1c; border-radius:8px; padding:10px 14px; font-size:13px; margin-bottom:18px; text-align:left; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">boom.</div>
  <div class="subtitle">Expense &amp; Recoupment Tracker</div>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <form method="POST">
    <label for="pw">Password</label>
    <input type="password" id="pw" name="password" placeholder="Enter password" autofocus/>
    <button class="btn" type="submit">Sign In</button>
  </form>
</div>
</body>
</html>
